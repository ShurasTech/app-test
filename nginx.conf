server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static PWA — no backend, no API routes (NFR3). Traefik terminates TLS
    # and forwards plain HTTP to this container over the internal network.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Only the hashed, content-addressed bundle files under /assets/ are safe
    # to cache "forever" — their filename changes whenever content changes.
    location ~* ^/assets/.*\.(?:js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Root-level icons/favicon keep the same filename across deploys, so they
    # must NOT be cached as aggressively or updates would never reach users.
    location ~* \.(?:svg|png|ico)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
}
