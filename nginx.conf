server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static PWA — no backend, no API routes (NFR3). Traefik terminates TLS
    # and forwards plain HTTP to this container over the internal network.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # service worker / manifest must never be cached aggressively, or PWA
    # updates won't be picked up by returning users.
    location ~* \.(?:js|css|svg|png|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
}
